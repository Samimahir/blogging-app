<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Settings Page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body.dark-mode {
      background-color: #121212;
      color: #f1f1f1;
    }
    .card.dark-mode {
      background-color: #1e1e1e;
      border-color: #333;
    }
    .nav-tabs .nav-link.active {
      background-color: #007bff;
      color: white;
    }
    body.dark-mode .form-section {
      display: none;
    }
  </style>
</head>
<body>
<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Settings</h2>
    <div class="form-check form-switch">
      <input class="form-check-input" type="checkbox" id="darkModeToggle">
      <label class="form-check-label" for="darkModeToggle">Dark Mode</label>
    </div>
  </div>

  <!-- Tabs -->
  <ul class="nav nav-tabs mb-3" id="settingsTabs" role="tablist">
    <li class="nav-item" role="presentation">
      <button class="nav-link active" id="profile-tab" data-bs-toggle="tab" data-bs-target="#profile" type="button">Profile</button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="nav-link" id="privacy-tab" data-bs-toggle="tab" data-bs-target="#privacy" type="button">Privacy</button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="nav-link" id="notifications-tab" data-bs-toggle="tab" data-bs-target="#notifications" type="button">Notifications</button>
    </li>
  </ul>

  <!-- Tab Content -->
  <div class="tab-content" id="settingsTabsContent">
    <!-- Profile Tab -->
    <div class="tab-pane fade show active" id="profile" role="tabpanel">
      <div class="card p-4 mb-3">
        <h5>Profile Settings</h5>
        <p>Username: johndoe</p>
        <p>Email: johndoe@example.com</p>
        <button class="btn btn-outline-primary" data-bs-toggle="modal" data-bs-target="#editModal">Edit</button>
      </div>
    </div>

    <!-- Privacy Tab -->
    <div class="tab-pane fade" id="privacy" role="tabpanel">
      <div class="card p-4 mb-3">
        <h5>Privacy Settings</h5>
        <div class="form-check mb-2">
          <input class="form-check-input" type="radio" name="privacySetting" id="privacyPublic" value="public">
          <label class="form-check-label" for="privacyPublic">Public</label>
        </div>
        <div class="form-check mb-2">
          <input class="form-check-input" type="radio" name="privacySetting" id="privacyPrivate" value="private">
          <label class="form-check-label" for="privacyPrivate">Private</label>
        </div>
        <div class="form-check mb-3">
          <input class="form-check-input" type="radio" name="privacySetting" id="privacyFriendsOnly" value="friends">
          <label class="form-check-label" for="privacyFriendsOnly">Friends Only</label>
        </div>
        <button type="button" class="btn btn-success">Save Privacy Settings</button>
      </div>
    </div>

    <!-- Notifications Tab -->
    <div class="tab-pane fade" id="notifications" role="tabpanel">
      <div class="card p-4 mb-3">
        <h5>Notification Settings</h5>
        <div class="form-check mb-2">
          <input class="form-check-input" type="radio" name="notificationSetting" id="notifAll" value="all">
          <label class="form-check-label" for="notifAll">All Notifications</label>
        </div>
        <div class="form-check mb-2">
          <input class="form-check-input" type="radio" name="notificationSetting" id="notifImportant" value="important">
          <label class="form-check-label" for="notifImportant">Only Important</label>
        </div>
        <div class="form-check mb-3">
          <input class="form-check-input" type="radio" name="notificationSetting" id="notifNone" value="none">
          <label class="form-check-label" for="notifNone">None</label>
        </div>
        <button type="button" class="btn btn-success">Save Notification Settings</button>
      </div>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <form class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="editModalLabel">Edit Profile</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="form-section">
          <div class="mb-3">
            <label for="editUsername" class="form-label">Username</label>
            <input type="text" class="form-control" id="editUsername" value="johndoe">
          </div>
          <div class="mb-3">
            <label for="editEmail" class="form-label">Email</label>
            <input type="email" class="form-control" id="editEmail" value="johndoe@example.com">
          </div>
          <hr>
          <h6>Change Password</h6>
          <div class="mb-3">
            <label for="currentPassword" class="form-label">Current Password</label>
            <input type="password" class="form-control" id="currentPassword" placeholder="Enter current password">
          </div>
          <div class="mb-3">
            <label for="newPassword" class="form-label">New Password</label>
            <input type="password" class="form-control" id="newPassword" placeholder="Enter new password">
          </div>
          <div class="mb-3">
            <label for="confirmPassword" class="form-label">Confirm New Password</label>
            <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm new password">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="submit" class="btn btn-success">Save Changes</button>
      </div>
    </form>
  </div>
</div>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Dark mode toggle
  const toggle = document.getElementById('darkModeToggle');
  toggle.addEventListener('change', () => {
    document.body.classList.toggle('dark-mode');
    document.querySelectorAll('.card').forEach(card => {
      card.classList.toggle('dark-mode');
    });
  });
</script>
</body>
</html>
